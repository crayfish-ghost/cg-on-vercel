---
layout: default
title: 管理人について
---

<div class="about-page">
  <a class="back-btn" href="{{ '/' | relative_url }}">← 一覧へ戻る</a>

  <div class="about-container">
    <div class="about-avatar">
      {% if site.author_avatar %}
      <img src="{{ site.author_avatar | relative_url }}" alt="{{ site.author }}" width="120" height="120" class="about-avatar-img">
      {% else %}
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="120" height="120">
        <rect width="120" height="120" fill="var(--border)"/>
        <circle cx="60" cy="46" r="22" fill="var(--text-faint)"/>
        <ellipse cx="60" cy="100" rx="34" ry="26" fill="var(--text-faint)"/>
      </svg>
      {% endif %}
    </div>

    <div class="about-body">
      <h1 class="about-name">{{ site.author }}</h1>
      <p class="about-bio">{{ site.author_bio }}</p>

      <ul class="about-links">
        {% for link in site.author_links %}
        <li>
          <a href="{{ link.url }}" class="about-link" target="_blank" rel="noopener">
            <span class="about-link-service">{{ link.service }}</span>
            <span class="about-link-handle">{{ link.handle }}</span>
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>

  <footer>
    <p>© {{ site.copyright }}</p>
  </footer>
</div>
